<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mini Shop Cart - SA Essentials</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🛒 Mini Shop</h1>
    <p>SA Essentials - Add to cart, save on refresh</p>

    <div class="products" id="products"></div>

    <div class="cart">
      <h2>Cart <span id="cart-count">0</span></h2>
      <div id="cart-items"></div>
      <h3>Total: R<span id="cart-total">0.00</span></h3>
      <button id="checkout">Mock Checkout</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
